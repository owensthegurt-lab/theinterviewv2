<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Interview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background -->
    <div id="background"></div>
    <div id="fade"></div>

    <!-- Title -->
    <section id="titleScreen">
        <h1>THE INTERVIEW</h1>
        <p>Some questions have no right answer.</p>

        <button id="startBtn">Begin</button>
        <button id="galleryBtn">Endings</button>
        <button id="achievementBtn">Achievements</button>
    </section>

    <!-- Game -->
    <main id="game" class="hidden">

        <div id="room">
            <div id="clock">9:00 AM</div>
            <div id="light"></div>
            <div id="window"></div>
            <div id="portrait"></div>
            <div id="recorder"></div>
            <div id="shadow"></div>
        </div>

        <div id="dialogueBox">
            <h2 id="speaker">Interviewer</h2>
            <p id="dialogue"></p>
            <div id="choices"></div>
        </div>

    </main>

    <!-- Gallery -->
    <section id="gallery" class="hidden">
        <h2>Endings</h2>
        <div id="galleryList"></div>
        <button class="backBtn">Back</button>
    </section>

    <!-- Achievements -->
    <section id="achievements" class="hidden">
        <h2>Achievements</h2>
        <div id="achievementList"></div>
        <button class="backBtn">Back</button>
    </section>

    <script src="data.js"></script>
    <script src="questions.js"></script>
    <script src="endings.js"></script>
    <script src="ui.js"></script>
    <script src="engine.js"></script>
    <script src="game.js"></script>

</body>
</html>
